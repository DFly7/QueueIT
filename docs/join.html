<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join the Queue — QueueIT</title>

  <!-- App Clip Smart Banner: shows the App Clip card in iOS Safari -->
  <!-- Add app-id=YOUR_APP_STORE_ID once the app is published -->
  <meta
    name="apple-itunes-app"
    content="app-clip-bundle-id=DF.QueueIT12.Clip, app-clip-display=card"
  />

  <style>
    :root {
      --bg: #0a0a0f;
      --cyan: #00e5ff;
      --purple: #8b5cf6;
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.5);
      --card: rgba(255, 255, 255, 0.06);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }

    .glow {
      width: 280px;
      height: 280px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,229,255,0.15) 0%, transparent 70%);
      position: fixed;
      top: -80px;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
    }

    .icon {
      font-size: 64px;
      margin-bottom: 24px;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 12px;
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    p {
      color: var(--muted);
      font-size: 16px;
      line-height: 1.6;
      max-width: 340px;
      margin-bottom: 36px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 16px 24px;
      margin-bottom: 16px;
      text-decoration: none;
      color: var(--text);
      font-size: 15px;
      font-weight: 600;
      transition: background 0.2s;
    }

    .badge:hover { background: rgba(255,255,255,0.1); }
    .badge svg { width: 24px; height: 24px; flex-shrink: 0; }

    .hint {
      color: var(--muted);
      font-size: 13px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="glow"></div>

  <div class="icon">🎵</div>

  <h1>You're invited to the queue</h1>
  <p>
    Open this link on your iPhone to instantly join the party and add songs —
    no app download required.
  </p>

  <!-- iOS users: the Smart App Banner above shows the App Clip card automatically.
       This button is a fallback for non-iOS or older devices. -->
  <a
    class="badge"
    href="https://apps.apple.com/app/queueit/id000000000"
    id="store-link"
  >
    <svg viewBox="0 0 24 24" fill="currentColor">
      <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
    </svg>
    Download QueueIT on the App Store
  </a>

  <p class="hint">On iPhone? Tap the banner at the top of the page to jump straight in.</p>

  <script>
    // Extract the join code from the URL and pass it along to the App Store link
    // so that when the full app opens it can deep-link into the right session.
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");
    if (code) {
      document.title = `Join party ${code} — QueueIT`;
    }
  </script>
</body>
</html>
